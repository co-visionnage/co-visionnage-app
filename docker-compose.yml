version: '3.9'

services:
  app:
    env_file:
      - .env
    build: .
    container_name: co-visionnage-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HOSTNAME: '0.0.0.0'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - co-net

  postgres:
    env_file:
      - .env
    image: postgres:16-alpine
    container_name: co-visionnage-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./database/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - co-net

  minio:
    env_file:
      - .env
    image: minio/minio:latest
    container_name: co-visionnage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - co-net

  minio-setup:
    env_file:
      - .env
    image: minio/mc:latest
    container_name: co-visionnage-minio-setup
    depends_on:
      - minio
    networks:
      - co-net
    entrypoint: >
      /bin/sh -c "until (/usr/bin/mc alias set local http://minio:9000
      ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY}) do echo 'waiting for minio';
      sleep 2; done; /usr/bin/mc mb --ignore-existing local/${STORAGE_BUCKET};
      /usr/bin/mc anonymous set download local/${STORAGE_BUCKET};"

networks:
  co-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
